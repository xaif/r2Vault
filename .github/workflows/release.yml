name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app

      - name: Build
        run: |
          xcodebuild \
            -project Fiaxe.xcodeproj \
            -scheme Fiaxe \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            clean build

      - name: Ad-hoc Code Sign
        run: |
          APP=$(find build/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          # Ad-hoc sign (free, no developer account needed)
          # --force replaces any existing signature
          # --deep signs nested frameworks/binaries
          codesign --force --deep --sign - "$APP"
          echo "Signed: $APP"
          codesign --verify --verbose "$APP" || true

      - name: Create DMG
        run: |
          APP=$(find build/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP")
          DMG_TMP="/tmp/r2vault_tmp.dmg"
          DMG_OUT="/tmp/r2Vault.dmg"
          VOLNAME="R2 Vault"

          # Strip quarantine xattrs (preserve code signature)
          xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true

          # Create writable DMG
          hdiutil create -size 80m -fs HFS+ -volname "$VOLNAME" "$DMG_TMP" -ov -quiet
          DEVICE=$(hdiutil attach "$DMG_TMP" -readwrite -noverify -noautoopen | awk 'END{print $1}')
          MOUNTPOINT="/Volumes/$VOLNAME"

          cp -R "$APP" "$MOUNTPOINT/"
          ln -s /Applications "$MOUNTPOINT/Applications"
          cp "$APP/Contents/Resources/AppIcon.icns" "$MOUNTPOINT/.VolumeIcon.icns"

          # Set Finder window layout
          osascript <<APPLESCRIPT
          tell application "Finder"
            tell disk "$VOLNAME"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {400, 200, 900, 520}
              set theViewOptions to icon view options of container window
              set arrangement of theViewOptions to not arranged
              set icon size of theViewOptions to 128
              set position of item "$APP_NAME" of container window to {150, 160}
              set position of item "Applications" of container window to {370, 160}
              close
              open
              update without registering applications
              delay 2
              close
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$DEVICE" -quiet
          hdiutil convert "$DMG_TMP" -format UDZO -imagekey zlib-level=9 -o "$DMG_OUT" -ov -quiet
          rm -f "$DMG_TMP"

          echo "DMG_PATH=$DMG_OUT" >> $GITHUB_ENV

      - name: Extract Changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Extract the section between this tag's heading and the next heading
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Write notes to a file to avoid shell quoting issues with special characters
          printf '%s\n' "$NOTES" > /tmp/release_notes.md
          printf '\n- - -\n\n' >> /tmp/release_notes.md
          printf '## Installation\n\n' >> /tmp/release_notes.md
          printf '**One-line install (recommended):**\n' >> /tmp/release_notes.md
          printf '```bash\ncurl -fsSL https://raw.githubusercontent.com/xaif/r2Vault/main/install.sh | bash\n```\n\n' >> /tmp/release_notes.md
          printf '**Homebrew:**\n' >> /tmp/release_notes.md
          printf '```bash\nbrew install --cask --no-quarantine xaif/tap/r2vault\n```\n\n' >> /tmp/release_notes.md
          printf '**Manual:** Download the DMG above, drag to Applications, then right-click the app > **Open** (first time only). Or run:\n' >> /tmp/release_notes.md
          printf '```\nxattr -dr com.apple.quarantine /Applications/R2Vault.app\n```\n' >> /tmp/release_notes.md

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.md

            gh release upload "$TAG" \
              "${{ env.DMG_PATH }}" \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.md \
              "${{ env.DMG_PATH }}"
          fi
